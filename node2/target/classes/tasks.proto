syntax = "proto3";

option java_package = "com.distributed.grpc";
option java_outer_classname = "TasksProto";
option java_multiple_files = true;

package tasks;

service TaskService {
  rpc SubmitTask (TaskRequest) returns (TaskResponse);
  rpc GetLeader (Empty) returns (LeaderResponse);
  rpc Elect (ElectionMessage) returns (ElectionResponse);
  rpc AnnounceLeader (LeaderResponse) returns (Empty);
  rpc Heartbeat (Empty) returns (Empty);
  rpc AcquireLock (LockRequest) returns (LockResponse);
  rpc ReleaseLock (LockRequest) returns (Empty);
}

message TaskRequest {
  string task_id = 1;
  string task_type = 2;
  string payload = 3;
}

message TaskResponse {
  string task_id = 1;
  string result = 2;
  string executed_by = 3;
}

message Empty {}

message LeaderResponse {
  int32 leader_id = 1;
  string leader_address = 2;
}

message ElectionMessage {
  int32 candidate_id = 1;
}

message ElectionResponse {
  bool ok = 1;
  int32 node_id = 2;
}

message LockRequest {
  string task_id = 1;
  int32 requester_id = 2;
  int64 ttl_ms = 3;
}

message LockResponse {
  bool acquired = 1;
  int32 holder_id = 2;
}
